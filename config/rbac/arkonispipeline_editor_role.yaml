---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: arkonis-operator
    app.kubernetes.io/managed-by: kustomize
  name: arkonispipeline-editor-role
rules:
- apiGroups:
  - arkonis.dev
  resources:
  - arkonispipelines
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - arkonis.dev
  resources:
  - arkonispipelines/status
  verbs:
  - get
