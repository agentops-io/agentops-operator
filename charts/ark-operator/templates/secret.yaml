{{- if and (not .Values.apiKeys.existingSecret) (or .Values.apiKeys.anthropicApiKey .Values.apiKeys.openaiApiKey) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ark-operator.fullname" . }}-api-keys
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ark-operator.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if .Values.apiKeys.anthropicApiKey }}
  ANTHROPIC_API_KEY: {{ .Values.apiKeys.anthropicApiKey | b64enc | quote }}
  {{- end }}
  {{- if .Values.apiKeys.openaiApiKey }}
  OPENAI_API_KEY: {{ .Values.apiKeys.openaiApiKey | b64enc | quote }}
  {{- end }}
{{- end }}
