# Default values for ark-operator.

# Number of operator replicas. More than 1 requires leaderElection.enabled = true.
replicaCount: 1

nameOverride: ""
fullnameOverride: ""

image:
  repository: ghcr.io/arkonis-dev/ark-operator
  pullPolicy: IfNotPresent
  # Overrides the image tag. Defaults to the chart appVersion.
  tag: ""

imagePullSecrets: []

# Namespace to deploy into. Defaults to the release namespace.
# Override with --namespace or --create-namespace on helm install.

serviceAccount:
  # Name of the ServiceAccount to create and use.
  name: ark-operator

# The container image used for ArkAgent runtime pods.
agentImage: ghcr.io/arkonis-dev/ark-runtime:latest

# Redis connection string. Required for flow execution.
# Example: redis.ark-system.svc.cluster.local:6379
taskQueueURL: ""

leaderElection:
  enabled: true

triggerWebhook:
  # Address the ArkEvent webhook server listens on inside the pod.
  addr: ":8092"
  # External URL of the webhook server. Written to ArkEvent status.webhookURL.
  # Example: http://ark-operator.ark-system.svc.cluster.local:8092
  url: ""

# Service for the ArkEvent webhook server.
service:
  # ClusterIP: reachable from within the cluster only.
  # LoadBalancer: exposes externally via cloud load balancer.
  # NodePort: exposes externally via node port.
  type: ClusterIP
  port: 8092

# API key secret configuration.
# The operator injects these as env vars into every agent pod it creates.
# Option A — reference an existing secret (recommended for production):
#   apiKeys:
#     existingSecret: my-ark-secrets   # must contain ANTHROPIC_API_KEY, etc.
# Option B — provide keys directly (stored in a new k8s Secret):
#   apiKeys:
#     anthropicApiKey: sk-ant-...
#     openaiApiKey: sk-...
apiKeys:
  existingSecret: ""
  anthropicApiKey: ""
  openaiApiKey: ""

# Additional environment variables injected into the operator pod.
# Useful for feature flags or any config not exposed above.
# Example:
#   extraEnv:
#     - name: MY_VAR
#       value: "foo"
extraEnv: []

# Mount additional env vars from existing ConfigMaps or Secrets.
# Example:
#   extraEnvFrom:
#     - secretRef:
#         name: my-secret
extraEnvFrom: []

# Annotations added to the operator pod.
# Common use: Prometheus scraping, Vault agent injection.
podAnnotations: {}

# Resource limits and requests for the operator pod.
resources:
  limits:
    cpu: 500m
    memory: 128Mi
  requests:
    cpu: 10m
    memory: 64Mi

nodeSelector: {}
tolerations: []
affinity: {}
